<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <style>
    .cursor { animation: blink 1.05s steps(1, end) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .word { animation: appear 0.6s ease-out both; }
    @keyframes appear { from { opacity: 0; transform: translateY(2px); } }
  </style>
  <rect width="1280" height="320" fill="#0a0a0a"/>

  <!-- crescent mark, top-left -->
  <mask id="bite">
    <rect width="1280" height="320" fill="#fff"/>
    <circle cx="84" cy="62" r="18" fill="#000"/>
  </mask>
  <circle cx="76" cy="68" r="20" fill="#fafafa" mask="url(#bite)"/>
  <text x="104" y="80" font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="15" letter-spacing="0.5" fill="#5a5a5a">~/imlunahey</text>

  <!-- centered wordmark -->
  <text class="word" x="640" y="172" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="42" font-weight="500" letter-spacing="-0.5" fill="#fafafa"
       >luna<tspan dx="8" class="cursor" fill="#fafafa">▊</tspan></text>

  <!-- tagline -->
  <text x="640" y="208" text-anchor="middle"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="14" letter-spacing="2" fill="#5a5a5a">// bluesky · atproto · side quests</text>

  <!-- bottom-right meta -->
  <text x="1224" y="280" text-anchor="end"
        font-family="ui-monospace, 'JetBrains Mono', 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace"
        font-size="13" letter-spacing="0.5" fill="#5a5a5a">[ MIT  ·  est. 1996 ]</text>
</svg>
